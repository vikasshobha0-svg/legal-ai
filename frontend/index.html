<!DOCTYPE html>
<html>
<head>
  <title>AI Public Defender</title>

  <!-- PDF Library -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Arial;
      background: #f4f6f9;
    }

    .navbar {
      background: #1a73e8;
      color: white;
      padding: 15px;
      display: flex;
      justify-content: space-between;
    }

    .hero {
      text-align: center;
      padding: 40px;
      background: white;
    }

    .section {
      padding: 20px;
      max-width: 900px;
      margin: auto;
    }

    .chat-box {
      height: 300px;
      overflow-y: auto;
      background: white;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid #ddd;
    }

    .message {
      margin: 10px;
      padding: 10px;
      border-radius: 10px;
      max-width: 70%;
      white-space: pre-wrap;
    }

    .user {
      background: #1a73e8;
      color: white;
      margin-left: auto;
    }

    .bot {
      background: #e4e6eb;
    }

    .input-box {
      display: flex;
      margin-top: 10px;
    }

    input {
      flex: 1;
      padding: 10px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    button {
      margin-left: 5px;
      padding: 10px;
      background: #1a73e8;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .card {
      background: white;
      padding: 15px;
      margin: 10px 0;
      border-radius: 10px;
    }

    .sos-btn {
      background: red;
      width: 100%;
      padding: 12px;
      color: white;
      border-radius: 8px;
    }

    .notice-btn {
      background: green;
      width: 100%;
      padding: 12px;
      color: white;
      border-radius: 8px;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<!-- Navbar -->
<div class="navbar">
  <h2>⚖️ AI Public Defender</h2>
</div>

<!-- Hero -->
<div class="hero">
  <h1>Your Free AI Legal Assistant</h1>
  <p>Understand your rights. Take action instantly.</p>
</div>

<!-- Chat -->
<div class="section">
  <h3>💬 Ask Your Legal Question</h3>

  <div id="chatBox" class="chat-box"></div>

  <div class="input-box">
    <input id="input" placeholder="Type your issue..." />
    <button onclick="sendMessage()">Send</button>
    <button onclick="startVoice()">🎤</button>
  </div>
</div>

<!-- Tools -->
<div class="section">

  <h3>⚙️ Legal Tools</h3>

  <div class="card">
    <h4>🚨 Emergency SOS</h4>
    <button class="sos-btn" onclick="sendSOS()">Find Nearby Police</button>
    <a href="tel:100">
      <button class="sos-btn" style="margin-top:5px;">Call Police</button>
    </a>
  </div>

  <div class="card">
    <h4>🧾 Legal Notice Generator</h4>
    <button class="notice-btn" onclick="generateNotice()">Generate & Download PDF</button>
  </div>

</div>

<script>
const chatBox = document.getElementById("chatBox");

// Add message
function addMessage(text, type) {
  const msg = document.createElement("div");
  msg.className = "message " + type;
  msg.innerText = text;
  chatBox.appendChild(msg);
  chatBox.scrollTop = chatBox.scrollHeight;
}

// Send message
async function sendMessage() {
  const input = document.getElementById("input");
  const message = input.value.trim();
  if (!message) return;

  addMessage(message, "user");
  input.value = "";

  const res = await fetch("http://localhost:5000/chat", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ message })
  });

  const data = await res.json();
  addMessage(data.reply, "bot");
}

// Voice
function startVoice() {
  const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
  recognition.start();
  recognition.onresult = e => {
    document.getElementById("input").value = e.results[0][0].transcript;
  };
}

// SOS
function sendSOS() {
  navigator.geolocation.getCurrentPosition(pos => {
    const lat = pos.coords.latitude;
    const lon = pos.coords.longitude;
    window.open(`https://www.google.com/maps/search/police+station/@${lat},${lon},15z`);
  });
}

// FIXED Legal Notice Generator
function generateNotice() {
  let issue = document.getElementById("input").value.trim();

  // If empty → use last user message
  if (!issue) {
    const messages = document.querySelectorAll(".user");
    if (messages.length > 0) {
      issue = messages[messages.length - 1].innerText;
    }
  }

  if (!issue) {
    alert("Please ask something in chat first.");
    return;
  }

  const notice = `
LEGAL NOTICE

Date: ${new Date().toLocaleDateString()}

To,
[Recipient Name]
[Address]

Subject: Legal Notice regarding grievance

Dear Sir/Madam,

Under instructions from my client, I hereby serve you with this legal notice.

My client states:

"${issue}"

Despite repeated requests, the issue remains unresolved.

You are hereby required to:

1. Resolve within 7 days
2. Provide compensation if applicable
3. Avoid further violations

Failing which legal proceedings will be initiated.

Sincerely,
[Your Name]
`;

  addMessage(notice, "bot");
  downloadPDF(notice);
}

// PDF
function downloadPDF(text) {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  const lines = doc.splitTextToSize(text, 180);
  doc.text(lines, 10, 10);

  doc.save("Legal_Notice.pdf");
}
</script>

</body>
</html>
